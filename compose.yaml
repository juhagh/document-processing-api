services:
  postgres:
    image: postgres:16
    container_name: documentjob-postgres
    environment:
      POSTGRES_DB: documentjobdb
      POSTGRES_USER: document_user
      POSTGRES_PASSWORD: document_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U document_user -d documentjobdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: documentjob-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: document_user
      RABBITMQ_DEFAULT_PASS: document_password
      RABBITMQ_DEFAULT_VHOST: document_processing
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json

  api:
    build:
      context: .
      dockerfile: src/DocumentProcessing.Api/Dockerfile
    container_name: documentjob-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DocumentProcessingDatabase: Host=postgres;Port=5432;Database=documentjobdb;Username=document_user;Password=document_password
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: document_user
      RabbitMq__Password: document_password
      RabbitMq__VirtualHost: document_processing
      RabbitMq__ClientName: DocumentProcessingApi
      RabbitMq__QueueName: document-processing.jobs
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: src/DocumentProcessing.Worker/Dockerfile
    container_name: documentjob-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__DocumentProcessingDatabase: Host=postgres;Port=5432;Database=documentjobdb;Username=document_user;Password=document_password
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: document_user
      RabbitMq__Password: document_password
      RabbitMq__VirtualHost: document_processing
      RabbitMq__ClientName: DocumentProcessingWorker
      RabbitMq__QueueName: document-processing.jobs