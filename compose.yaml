services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: documentjob_rabbitmq
    hostname: documentjob-rabbit
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: document_user
      RABBITMQ_DEFAULT_PASS: document_password
      RABBITMQ_DEFAULT_VHOST: document_processing
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: documentjob_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: documentjobdb
      POSTGRES_USER: document_user
      POSTGRES_PASSWORD: document_password
    ports:
      - "5432:5432"
    volumes:
      - documentjob_pgdata:/var/lib/postgresql/data

volumes:
  documentjob_pgdata:
